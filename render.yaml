databases:
  - name: cloud-scheduler-db
    plan: free
    databaseName: cloud_scheduler

services:
  - type: web
    name: gnn-cloud-scheduler-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloud-scheduler-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
